<html lang="pt-BR" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    <script src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <main class="d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 bg-body" style="width: 350px;">

            <h2 id="titulo" class="text-center mb-4">Login</h2>

            <form id="form-login">

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>
                </div>

                <button id="botao-envio" type="submit" class="btn btn-primary w-100">
                    Entrar
                </button>
            </form>

            <div id="mensagem" class="mt-3 text-center"></div>

            <div class="text-center mt-3">
                <small id="toggle" style="cursor: pointer;">
                    Não tem conta? Cadastre-se!
                </small>
            </div>

        </div>

    </main>

</body>

</html>
